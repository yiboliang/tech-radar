<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业雷达 · AI / 光互联 / 半导体</title>
<style>
  :root {
    --bg: #ffffff; --card: #ffffff; --border: #dadce0;
    --text: #202124; --muted: #5f6368; --accent: #1a73e8;
    --accent-bg: #e8f0fe; --hover: #f8f9fa;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: "Google Sans", Roboto, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  header { padding: 28px 24px 8px; max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 500; letter-spacing: -0.2px; }
  h1 span { color: var(--accent); font-weight: 500; }
  .updated { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 24px 60px; }
  .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0 12px; align-items: center; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab { padding: 7px 16px; border-radius: 16px; border: 1px solid var(--border); background: #fff; color: var(--muted); cursor: pointer; font-size: 13px; font-family: inherit; transition: background .15s; }
  .tab:hover { background: var(--hover); }
  .tab.active { background: var(--accent-bg); color: var(--accent); border-color: transparent; font-weight: 500; }
  #search { flex: 1; min-width: 200px; padding: 9px 16px; border-radius: 24px; border: 1px solid var(--border); background: #fff; color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .kw-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
  .kw { background: var(--accent-bg); border: none; color: var(--accent); padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .kw.off { background: #f1f3f4; color: var(--muted); }
  .kw b { cursor: pointer; font-weight: 400; opacity: .7; }
  #kw-input { width: 140px; padding: 5px 12px; border-radius: 14px; border: 1px dashed var(--border); background: transparent; color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
  #kw-input:focus { border-color: var(--accent); }
  .kw-hint { color: var(--muted); font-size: 11px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 1px 3px rgba(60,64,67,.15), 0 4px 8px rgba(60,64,67,.1); }
  .card a { color: var(--accent); text-decoration: none; font-size: 15px; font-weight: 500; line-height: 1.5; }
  .card a:hover { text-decoration: underline; }
  .meta { margin-top: 6px; font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .topic-tag { background: #f1f3f4; color: var(--muted); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .summary { margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; }
  mark { background: #feefc3; color: inherit; border-radius: 2px; }
  .gh-section { font-size: 16px; font-weight: 500; color: var(--text); margin: 24px 0 12px; }
  .gh-stars { color: #f9ab00; font-weight: 500; }
  .gh-lang { display: inline-flex; align-items: center; gap: 4px; }
  .gh-lang::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
</style>
</head>
<body>
<header>
  <h1>行业雷达 <span>AI · 光互联 · 半导体</span></h1>
  <div class="updated" id="updated">加载中…</div>
</header>
<div class="container">
  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <input id="search" type="search" placeholder="搜索标题 / 摘要…">
  </div>
  <div class="kw-bar" id="kw-bar"></div>
  <div id="list"></div>
</div>
<script>
const LS_KEY = "radar_keywords_v1";
const GH_TAB = "GitHub热门";
let DATA = { topics: [], items: [] };
let TRENDING = null;
let activeTab = "全部";
let query = "";

// 自定义关键词：{word, on}
function loadKws() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; } }
function saveKws(k) { localStorage.setItem(LS_KEY, JSON.stringify(k)); }
let kws = loadKws();

function esc(s) { return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderTabs() {
  const tabs = ["全部", ...DATA.topics, GH_TAB];
  document.getElementById("tabs").innerHTML = tabs.map(t =>
    `<button class="tab${t===activeTab?" active":""}" onclick="setTab('${t}')">${t}</button>`).join("");
}
function setTab(t) { activeTab = t; renderTabs(); renderList(); }

function repoCard(r) {
  const d = r.created ? new Date(r.created).toLocaleDateString("zh-CN") : "";
  return `<div class="card">
    <a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.name)}</a>
    <div class="meta">
      <span class="gh-stars">★ ${r.stars.toLocaleString()}</span>
      ${r.lang ? `<span class="gh-lang">${esc(r.lang)}</span>` : ""}
      ${d ? `<span>创建于 ${d}</span>` : ""}
    </div>
    ${r.desc ? `<div class="summary">${esc(r.desc)}</div>` : ""}
  </div>`;
}

function renderTrending() {
  const el = document.getElementById("list");
  if (!TRENDING) { el.innerHTML = `<div class="empty">GitHub 热门数据尚未生成，等下一次自动抓取即可</div>`; return; }
  const q = query.toLowerCase();
  const f = arr => arr.filter(r => !q || (r.name + " " + r.desc).toLowerCase().includes(q));
  const ns = f(TRENDING.new_stars || []), ai = f(TRENDING.ai_active || []);
  el.innerHTML =
    `<div class="gh-section">🚀 本周新星（近7天创建）</div>` +
    (ns.length ? ns.map(repoCard).join("") : `<div class="empty">暂无</div>`) +
    `<div class="gh-section">🔥 AI 热门活跃（近3天有更新）</div>` +
    (ai.length ? ai.map(repoCard).join("") : `<div class="empty">暂无</div>`);
}

function renderKwBar() {
  const el = document.getElementById("kw-bar");
  el.innerHTML = kws.map((k,i) =>
    `<span class="kw${k.on?"":" off"}" onclick="toggleKw(${i})">${esc(k.word)}<b onclick="event.stopPropagation();delKw(${i})">✕</b></span>`
  ).join("") +
  `<input id="kw-input" placeholder="＋自定义关键词" onkeydown="if(event.key==='Enter')addKw(this.value)">` +
  `<span class="kw-hint">点击关键词开/关过滤，✕ 删除；开启后只显示命中的文章</span>`;
}
function addKw(w) { w = w.trim(); if (!w) return; kws.push({word: w, on: true}); saveKws(kws); renderKwBar(); renderList(); }
function toggleKw(i) { kws[i].on = !kws[i].on; saveKws(kws); renderKwBar(); renderList(); }
function delKw(i) { kws.splice(i,1); saveKws(kws); renderKwBar(); renderList(); }

function renderList() {
  if (activeTab === GH_TAB) { renderTrending(); return; }
  const activeKws = kws.filter(k => k.on).map(k => k.word.toLowerCase());
  const q = query.toLowerCase();
  const rows = DATA.items.filter(it => {
    if (activeTab !== "全部" && !it.topics.includes(activeTab)) return false;
    const text = (it.title + " " + it.summary).toLowerCase();
    if (q && !text.includes(q)) return false;
    if (activeKws.length && !activeKws.some(k => text.includes(k))) return false;
    return true;
  });
  const hi = s => {
    let out = esc(s);
    for (const k of [...activeKws, q].filter(Boolean)) {
      out = out.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi"), m => `<mark>${m}</mark>`);
    }
    return out;
  };
  document.getElementById("list").innerHTML = rows.length ? rows.map(it => `
    <div class="card">
      <a href="${esc(it.link)}" target="_blank" rel="noopener">${hi(it.title)}</a>
      <div class="meta">
        <span>${esc(it.source)}</span>
        <span>${new Date(it.published).toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
        ${it.topics.map(t=>`<span class="topic-tag">${t}</span>`).join("")}
      </div>
      ${it.summary ? `<div class="summary">${hi(it.summary)}</div>` : ""}
    </div>`).join("") : `<div class="empty">没有符合条件的文章</div>`;
}

document.getElementById("search").addEventListener("input", e => { query = e.target.value; renderList(); });

function boot(d) {
  DATA = d;
  document.getElementById("updated").textContent =
    "最近更新：" + new Date(d.updated).toLocaleString("zh-CN") + " · 共 " + d.items.length + " 条";
  renderTabs(); renderKwBar(); renderList();
}
fetch("data.json?_=" + Date.now()).then(r => r.json()).then(boot).catch(() => {
  // file:// 直接打开时 fetch 被浏览器拦截，回退到 data.js
  const s = document.createElement("script");
  s.src = "data.js";
  s.onload = () => window.RADAR_DATA ? boot(window.RADAR_DATA) : fail();
  s.onerror = fail;
  document.body.appendChild(s);
  function fail() {
    document.getElementById("updated").textContent = "数据加载失败——请先运行 fetch_news.py 生成数据";
  }
});

fetch("trending.json?_=" + Date.now()).then(r => r.json())
  .then(d => { TRENDING = d; if (activeTab === GH_TAB) renderList(); })
  .catch(() => {
    const s = document.createElement("script");
    s.src = "trending.js";
    s.onload = () => { if (window.RADAR_TRENDING) { TRENDING = window.RADAR_TRENDING; if (activeTab === GH_TAB) renderList(); } };
    document.body.appendChild(s);
  });
</script>
</body>
</html>
