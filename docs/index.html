<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行业雷达 · AI / 光互联 / 半导体</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --tag: #1f6feb22;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  header { padding: 24px 20px 12px; max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; }
  h1 span { color: var(--accent); }
  .updated { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; align-items: center; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; }
  .tab.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
  #search { flex: 1; min-width: 180px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; }
  .kw-bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .kw { background: var(--tag); border: 1px solid #1f6feb55; color: var(--accent); padding: 3px 10px; border-radius: 14px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .kw.off { opacity: .35; }
  .kw b { cursor: pointer; font-weight: 400; color: var(--muted); }
  #kw-input { width: 130px; padding: 4px 10px; border-radius: 14px; border: 1px dashed var(--border); background: transparent; color: var(--text); font-size: 12px; }
  .kw-hint { color: var(--muted); font-size: 11px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .card a { color: var(--text); text-decoration: none; font-size: 15px; font-weight: 600; line-height: 1.45; }
  .card a:hover { color: var(--accent); }
  .meta { margin-top: 6px; font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .topic-tag { background: var(--tag); color: var(--accent); padding: 1px 8px; border-radius: 10px; font-size: 11px; }
  .summary { margin-top: 6px; font-size: 13px; color: var(--muted); line-height: 1.5; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; }
  mark { background: #d2992255; color: inherit; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>行业雷达 <span>AI · 光互联 · 半导体</span></h1>
  <div class="updated" id="updated">加载中…</div>
</header>
<div class="container">
  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <input id="search" type="search" placeholder="搜索标题 / 摘要…">
  </div>
  <div class="kw-bar" id="kw-bar"></div>
  <div id="list"></div>
</div>
<script>
const LS_KEY = "radar_keywords_v1";
let DATA = { topics: [], items: [] };
let activeTab = "全部";
let query = "";

// 自定义关键词：{word, on}
function loadKws() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; } }
function saveKws(k) { localStorage.setItem(LS_KEY, JSON.stringify(k)); }
let kws = loadKws();

function esc(s) { return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderTabs() {
  const tabs = ["全部", ...DATA.topics];
  document.getElementById("tabs").innerHTML = tabs.map(t =>
    `<button class="tab${t===activeTab?" active":""}" onclick="setTab('${t}')">${t}</button>`).join("");
}
function setTab(t) { activeTab = t; renderTabs(); renderList(); }

function renderKwBar() {
  const el = document.getElementById("kw-bar");
  el.innerHTML = kws.map((k,i) =>
    `<span class="kw${k.on?"":" off"}" onclick="toggleKw(${i})">${esc(k.word)}<b onclick="event.stopPropagation();delKw(${i})">✕</b></span>`
  ).join("") +
  `<input id="kw-input" placeholder="＋自定义关键词" onkeydown="if(event.key==='Enter')addKw(this.value)">` +
  `<span class="kw-hint">点击关键词开/关过滤，✕ 删除；开启后只显示命中的文章</span>`;
}
function addKw(w) { w = w.trim(); if (!w) return; kws.push({word: w, on: true}); saveKws(kws); renderKwBar(); renderList(); }
function toggleKw(i) { kws[i].on = !kws[i].on; saveKws(kws); renderKwBar(); renderList(); }
function delKw(i) { kws.splice(i,1); saveKws(kws); renderKwBar(); renderList(); }

function renderList() {
  const activeKws = kws.filter(k => k.on).map(k => k.word.toLowerCase());
  const q = query.toLowerCase();
  const rows = DATA.items.filter(it => {
    if (activeTab !== "全部" && !it.topics.includes(activeTab)) return false;
    const text = (it.title + " " + it.summary).toLowerCase();
    if (q && !text.includes(q)) return false;
    if (activeKws.length && !activeKws.some(k => text.includes(k))) return false;
    return true;
  });
  const hi = s => {
    let out = esc(s);
    for (const k of [...activeKws, q].filter(Boolean)) {
      out = out.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi"), m => `<mark>${m}</mark>`);
    }
    return out;
  };
  document.getElementById("list").innerHTML = rows.length ? rows.map(it => `
    <div class="card">
      <a href="${esc(it.link)}" target="_blank" rel="noopener">${hi(it.title)}</a>
      <div class="meta">
        <span>${esc(it.source)}</span>
        <span>${new Date(it.published).toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
        ${it.topics.map(t=>`<span class="topic-tag">${t}</span>`).join("")}
      </div>
      ${it.summary ? `<div class="summary">${hi(it.summary)}</div>` : ""}
    </div>`).join("") : `<div class="empty">没有符合条件的文章</div>`;
}

document.getElementById("search").addEventListener("input", e => { query = e.target.value; renderList(); });

function boot(d) {
  DATA = d;
  document.getElementById("updated").textContent =
    "最近更新：" + new Date(d.updated).toLocaleString("zh-CN") + " · 共 " + d.items.length + " 条";
  renderTabs(); renderKwBar(); renderList();
}
fetch("data.json?_=" + Date.now()).then(r => r.json()).then(boot).catch(() => {
  // file:// 直接打开时 fetch 被浏览器拦截，回退到 data.js
  const s = document.createElement("script");
  s.src = "data.js";
  s.onload = () => window.RADAR_DATA ? boot(window.RADAR_DATA) : fail();
  s.onerror = fail;
  document.body.appendChild(s);
  function fail() {
    document.getElementById("updated").textContent = "数据加载失败——请先运行 fetch_news.py 生成数据";
  }
});
</script>
</body>
</html>
