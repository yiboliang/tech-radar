name: 抓取资讯并更新网站

on:
  schedule:
    - cron: "0 */3 * * *"   # 每3小时抓取一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser requests
      - run: python fetch_news.py
      - run: python fetch_trending.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: python fetch_x.py
        continue-on-error: true   # Nitter 镜像不稳定，失败不影响其他数据
      - name: 提交数据
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M')"
          git push
